<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contacto — Mi Negocio</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}</style>
</head><body><script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script><nav style="position:sticky;top:0;z-index:50;background:white;border-bottom:1px solid #e2e8f0;padding:0 1.5rem">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px">
    <a href="index.html" style="font-size:1.25rem;font-weight:700;color:#7c3aed;text-decoration:none">Mi Negocio</a>
    <div style="display:flex;gap:2rem">
      <a href="index.html" style="color:#475569;text-decoration:none;font-size:0.9rem">Inicio</a>
      <a href="services.html" style="color:#475569;text-decoration:none;font-size:0.9rem">Servicios</a>
      <a href="about.html" style="color:#475569;text-decoration:none;font-size:0.9rem">Nosotros</a>
      <a href="contact.html" style="background:#7c3aed;color:white;padding:0.5rem 1.25rem;border-radius:9999px;text-decoration:none;font-size:0.9rem">Contacto</a>
    </div>
  </div>
</nav>
<main style="flex:1;padding:4rem 1.5rem">
  <div style="max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:3rem">
    <div>
      <h1 style="font-size:2rem;font-weight:700;color:#0f172a;margin:0 0 1rem">Contactanos</h1>
      <p style="color:#475569;margin:0 0 2rem">Estamos para ayudarte. Completá el formulario y nos comunicamos a la brevedad.</p>
      
      
      
      
    </div>
    <div x-data="{status:'idle',form:{name:'',email:'',message:''}}" style="background:#f8fafc;border-radius:1rem;padding:2rem">
      <template x-if="status==='success'">
        <div style="text-align:center;padding:2rem">
          <p style="font-size:2rem">✅</p>
          <h3 style="color:#0f172a;margin:0 0 0.5rem">¡Mensaje enviado!</h3>
          <p style="color:#475569">Te respondemos pronto.</p>
        </div>
      </template>
      <template x-if="status!=='success'">
        <form @submit.prevent="status='sending';fetch('https://wa.me/',{method:'GET'}).catch(()=>{}).finally(()=>status='success')">
          <div style="margin-bottom:1rem">
            <label style="display:block;font-weight:600;color:#0f172a;margin-bottom:0.25rem;font-size:0.9rem">Nombre</label>
            <input x-model="form.name" required style="width:100%;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.625rem;font-size:0.9rem;box-sizing:border-box" placeholder="Tu nombre">
          </div>
          <div style="margin-bottom:1rem">
            <label style="display:block;font-weight:600;color:#0f172a;margin-bottom:0.25rem;font-size:0.9rem">Email</label>
            <input x-model="form.email" type="email" required style="width:100%;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.625rem;font-size:0.9rem;box-sizing:border-box" placeholder="tu@email.com">
          </div>
          <div style="margin-bottom:1.5rem">
            <label style="display:block;font-weight:600;color:#0f172a;margin-bottom:0.25rem;font-size:0.9rem">Mensaje</label>
            <textarea x-model="form.message" required rows="4" style="width:100%;border:1px solid #e2e8f0;border-radius:0.5rem;padding:0.625rem;font-size:0.9rem;box-sizing:border-box;resize:vertical" placeholder="¿En qué podemos ayudarte?"></textarea>
          </div>
          <button type="submit" :disabled="status==='sending'" style="width:100%;background:#7c3aed;color:white;padding:0.875rem;border-radius:0.5rem;border:none;font-weight:600;cursor:pointer;font-size:1rem">
            <span x-text="status==='sending'?'Enviando...':'Enviar mensaje'"></span>
          </button>
        </form>
      </template>
    </div>
  </div>
</main><footer style="background:#0f172a;padding:3rem 1.5rem;margin-top:auto">
  <div style="max-width:1200px;margin:0 auto;text-align:center">
    <p style="color:#94a3b8;font-size:0.9rem;margin:0 0 0.5rem">Mi Negocio — </p>
    <p style="color:#64748b;font-size:0.75rem;margin:0">Sitio por <a href="https://webia.agency" style="color:#94a3b8">WebIA Agency</a></p>
  </div>
</footer></body></html>
